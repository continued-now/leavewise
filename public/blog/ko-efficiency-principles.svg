<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <rect width="800" height="220" rx="16" fill="#F7F6F2"/>

  <!-- Card 1: teal — 공휴일 옆에 붙이기 -->
  <rect x="24" y="24" width="236" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="24" y="24" width="236" height="52" rx="12" fill="#E8F3F3"/>
  <rect x="24" y="64" width="236" height="12" fill="#FFF"/>
  <!-- Calendar icon -->
  <g transform="translate(142,34)">
    <rect x="-12" y="0" width="24" height="20" rx="3" fill="none" stroke="#1A6363" stroke-width="1.5" opacity="0.6"/>
    <line x1="-12" y1="7" x2="12" y2="7" stroke="#1A6363" stroke-width="1.5" opacity="0.6"/>
    <line x1="-6" y1="0" x2="-6" y2="-4" stroke="#1A6363" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="6" y1="0" x2="6" y2="-4" stroke="#1A6363" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <rect x="-7" y="10" width="4" height="3" rx="0.5" fill="#1A6363" opacity="0.5"/>
    <rect x="-1" y="10" width="4" height="3" rx="0.5" fill="#1A6363" opacity="0.5"/>
    <rect x="5" y="10" width="4" height="3" rx="0.5" fill="#1A6363" opacity="0.3"/>
  </g>
  <text x="142" y="94" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">공휴일 옆에 붙이기</text>
  <text x="142" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44403C">공휴일이 목요일이면 금요일에</text>
  <text x="142" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44403C">연차 1일로 4일 연휴 완성</text>
  <rect x="80" y="148" width="124" height="26" rx="6" fill="#1A6363" opacity="0.07"/>
  <text x="142" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A6363">효율 3~4배</text>

  <!-- Card 2: sage — 대체공휴일 활용 -->
  <rect x="282" y="24" width="236" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="282" y="24" width="236" height="52" rx="12" fill="#EEF6F1"/>
  <rect x="282" y="64" width="236" height="12" fill="#FFF"/>
  <!-- Swap/arrow icon -->
  <g transform="translate(400,36)">
    <path d="M-10 4L-2 -2L-2 1L10 1L10 7L-2 7L-2 10Z" fill="#4A7C5E" opacity="0.5"/>
    <path d="M10 -4L2 2L2 -1L-10 -1L-10 -7L2 -7L2 -10Z" fill="#4A7C5E" opacity="0.35"/>
  </g>
  <text x="400" y="94" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">대체공휴일 활용</text>
  <text x="400" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44403C">2026년 대체공휴일 5회, 모두</text>
  <text x="400" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44403C">월요일 — 연차 없이 3일 연휴</text>
  <rect x="338" y="148" width="124" height="26" rx="6" fill="#4A7C5E" opacity="0.07"/>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A7C5E">연차 0일 필요</text>

  <!-- Card 3: coral — 연휴 사이 끼워넣기 -->
  <rect x="540" y="24" width="236" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="540" y="24" width="236" height="52" rx="12" fill="#FEF0ED"/>
  <rect x="540" y="64" width="236" height="12" fill="#FFF"/>
  <!-- Puzzle/link icon -->
  <g transform="translate(658,36)">
    <rect x="-12" y="-5" width="10" height="10" rx="2" fill="#D95740" opacity="0.4"/>
    <rect x="2" y="-5" width="10" height="10" rx="2" fill="#D95740" opacity="0.4"/>
    <rect x="-3" y="-3" width="6" height="6" rx="1" fill="#D95740" opacity="0.55"/>
  </g>
  <text x="658" y="94" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">연휴 사이 끼워넣기</text>
  <text x="658" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44403C">9~10월 추석·개천절·한글날 사이</text>
  <text x="658" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44403C">연차 4일로 최대 16일 연휴</text>
  <rect x="596" y="148" width="124" height="26" rx="6" fill="#D95740" opacity="0.07"/>
  <text x="658" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#D95740">효율 4배 이상</text>
</svg>