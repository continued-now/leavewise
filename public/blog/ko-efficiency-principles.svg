<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 800 220"><rect width="800" height="220" fill="#f7f6f2" rx="16"/><rect width="236" height="172" x="24" y="24" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="236" height="52" x="24" y="24" fill="#e8f3f3" rx="12"/><path fill="#fff" d="M24 64h236v12H24z"/><g transform="translate(142 34)"><rect width="24" height="20" x="-12" stroke="#1a6363" stroke-width="1.5" opacity=".6" rx="3"/><path stroke="#1a6363" stroke-width="1.5" d="M-12 7h24" opacity=".6"/><path stroke="#1a6363" stroke-linecap="round" stroke-width="1.5" d="M-6 0v-4M6 0v-4" opacity=".6"/><rect width="4" height="3" x="-7" y="10" fill="#1a6363" opacity=".5" rx=".5"/><rect width="4" height="3" x="-1" y="10" fill="#1a6363" opacity=".5" rx=".5"/><rect width="4" height="3" x="5" y="10" fill="#1a6363" opacity=".3" rx=".5"/></g><text x="142" y="94" fill="#1c1917" font-family="Georgia, serif" font-size="15" font-weight="700" text-anchor="middle">공휴일 옆에 붙이기</text><text x="142" y="114" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">공휴일이 목요일이면 금요일에</text><text x="142" y="130" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">연차 1일로 4일 연휴 완성</text><rect width="124" height="26" x="80" y="148" fill="#1a6363" opacity=".07" rx="6"/><text x="142" y="165" fill="#1a6363" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">효율 3~4배</text><rect width="236" height="172" x="282" y="24" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="236" height="52" x="282" y="24" fill="#eef6f1" rx="12"/><path fill="#fff" d="M282 64h236v12H282z"/><g fill="#4a7c5e"><path d="m390 40 8-6v3h12v6h-12v3Z" opacity=".5"/><path d="m410 32-8 6v-3h-12v-6h12v-3Z" opacity=".35"/></g><text x="400" y="94" fill="#1c1917" font-family="Georgia, serif" font-size="15" font-weight="700" text-anchor="middle">대체공휴일 활용</text><text x="400" y="114" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">2026년 대체공휴일 5회, 모두</text><text x="400" y="130" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">월요일 — 연차 없이 3일 연휴</text><rect width="124" height="26" x="338" y="148" fill="#4a7c5e" opacity=".07" rx="6"/><text x="400" y="165" fill="#4a7c5e" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">연차 0일 필요</text><rect width="236" height="172" x="540" y="24" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="236" height="52" x="540" y="24" fill="#fef0ed" rx="12"/><path fill="#fff" d="M540 64h236v12H540z"/><g fill="#d95740" transform="translate(658 36)"><rect width="10" height="10" x="-12" y="-5" opacity=".4" rx="2"/><rect width="10" height="10" x="2" y="-5" opacity=".4" rx="2"/><rect width="6" height="6" x="-3" y="-3" opacity=".55" rx="1"/></g><text x="658" y="94" fill="#1c1917" font-family="Georgia, serif" font-size="15" font-weight="700" text-anchor="middle">연휴 사이 끼워넣기</text><text x="658" y="114" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">9~10월 추석·개천절·한글날 사이</text><text x="658" y="130" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">연차 4일로 최대 16일 연휴</text><rect width="124" height="26" x="596" y="148" fill="#d95740" opacity=".07" rx="6"/><text x="658" y="165" fill="#d95740" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">효율 4배 이상</text></svg>