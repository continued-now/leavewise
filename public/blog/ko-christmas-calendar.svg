<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="16" fill="#F7F6F2"/>
  <rect y="0" width="800" height="52" rx="16" fill="#1A6363"/>
  <rect y="28" width="800" height="24" fill="#1A6363"/>
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="600" fill="#FFF">2026년 연말 — 크리스마스·신정 연차 전략</text>

  <!-- Day headers row -->
  <g font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78716C" text-anchor="middle">
    <text x="44" y="80">목</text>
    <text x="118" y="80">금</text>
    <text x="192" y="80">토</text>
    <text x="266" y="80">일</text>
    <text x="340" y="80">월</text>
    <text x="414" y="80">화</text>
    <text x="488" y="80">수</text>
    <text x="562" y="80">목</text>
    <text x="636" y="80">금</text>
    <text x="722" y="80">토-일</text>
  </g>

  <!-- Dec 24 — 평일 (목) -->
  <rect x="14" y="92" width="60" height="88" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <text x="44" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#78716C">24</text>
  <text x="44" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">12월</text>
  <text x="44" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">이브</text>

  <!-- Dec 25 — 크리스마스 (금) -->
  <rect x="82" y="92" width="72" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="118" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#D95740">25</text>
  <text x="118" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">크리스</text>
  <text x="118" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">마스</text>

  <!-- Dec 26 — 주말 (토) -->
  <rect x="160" y="92" width="64" height="88" rx="12" fill="#EEECEA"/>
  <text x="192" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#78716C">26</text>
  <text x="192" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">주말</text>

  <!-- Dec 27 — 주말 (일) -->
  <rect x="230" y="92" width="64" height="88" rx="12" fill="#EEECEA"/>
  <text x="262" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#78716C">27</text>
  <text x="262" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">주말</text>

  <!-- Dec 28 — 선택 연차 (월) -->
  <rect x="300" y="92" width="72" height="88" rx="12" fill="#F7F6F2" stroke="#E5E2DA" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="336" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#A8A29E">28</text>
  <text x="336" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">평일</text>
  <text x="336" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">(연차 시 확장)</text>

  <!-- Dec 29 — 연차 1 (화) -->
  <rect x="378" y="92" width="72" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="414" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A6363">29</text>
  <text x="414" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">연차 1</text>

  <!-- Dec 30 — 연차 2 (수) -->
  <rect x="452" y="92" width="72" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="488" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A6363">30</text>
  <text x="488" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">연차 2</text>

  <!-- Dec 31 — 연차 3 (목) -->
  <rect x="530" y="92" width="64" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="562" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A6363">31</text>
  <text x="562" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">연차 3</text>

  <!-- Jan 1 — 신정 (금) -->
  <rect x="600" y="92" width="72" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="636" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#D95740">1</text>
  <text x="636" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">1월</text>
  <text x="636" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">신정</text>

  <!-- Jan 2-3 — 주말 (토-일) -->
  <rect x="680" y="92" width="96" height="88" rx="12" fill="#EEECEA"/>
  <text x="728" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#78716C">2-3</text>
  <text x="728" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">주말</text>

  <!-- Divider -->
  <rect x="24" y="200" width="752" height="1" fill="#E5E2DA"/>

  <!-- Legend -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#44403C">
    <rect x="40" y="220" width="14" height="14" rx="4" fill="#E8F3F3" stroke="#1A6363" stroke-width="1"/>
    <text x="62" y="232">연차 (3일)</text>
    <rect x="170" y="220" width="14" height="14" rx="4" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
    <text x="192" y="232">공휴일</text>
    <rect x="280" y="220" width="14" height="14" rx="4" fill="#EEECEA"/>
    <text x="302" y="232">주말</text>
    <rect x="370" y="220" width="14" height="14" rx="4" fill="#F7F6F2" stroke="#E5E2DA" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="392" y="232">선택 연차</text>
  </g>

  <!-- Result callout -->
  <rect x="24" y="256" width="752" height="56" rx="12" fill="#1A6363"/>
  <text x="400" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.75">연차 단 3일로</text>
  <text x="400" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="600" fill="#FFF">10일 연속 연말 휴가 — 3.3배 효율</text>
</svg>