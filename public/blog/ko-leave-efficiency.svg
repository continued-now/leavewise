<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <rect width="800" height="200" rx="16" fill="#F7F6F2"/>

  <!-- Left: Inefficient -->
  <rect x="24" y="24" width="364" height="152" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="24" y="24" width="364" height="40" rx="12" fill="#FEF0ED"/>
  <rect x="24" y="52" width="364" height="12" fill="#FFF"/>
  <text x="206" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#D95740">비효율</text>

  <!-- Inefficient example: 1 day used, 1 day off -->
  <text x="48" y="92" font-family="system-ui, sans-serif" font-size="12" fill="#44403C">수요일에 연차 1일 사용</text>
  <!-- Day blocks -->
  <rect x="48" y="104" width="48" height="28" rx="6" fill="#EEECEA"/>
  <text x="72" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">월</text>
  <rect x="100" y="104" width="48" height="28" rx="6" fill="#EEECEA"/>
  <text x="124" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">화</text>
  <rect x="152" y="104" width="48" height="28" rx="6" fill="#D95740" opacity="0.15" stroke="#D95740" stroke-width="1"/>
  <text x="176" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">수</text>
  <rect x="204" y="104" width="48" height="28" rx="6" fill="#EEECEA"/>
  <text x="228" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">목</text>
  <rect x="256" y="104" width="48" height="28" rx="6" fill="#EEECEA"/>
  <text x="280" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">금</text>

  <rect x="48" y="144" width="112" height="24" rx="6" fill="#D95740" opacity="0.07"/>
  <text x="104" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#D95740">1일 = 1일 (1.0배)</text>

  <!-- Right: Efficient -->
  <rect x="412" y="24" width="364" height="152" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="412" y="24" width="364" height="40" rx="12" fill="#E8F3F3"/>
  <rect x="412" y="52" width="364" height="12" fill="#FFF"/>
  <text x="594" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1A6363">고효율</text>

  <!-- Efficient example: 1 day used, 3 days off -->
  <text x="436" y="92" font-family="system-ui, sans-serif" font-size="12" fill="#44403C">금요일에 연차 1일 사용</text>
  <!-- Day blocks -->
  <rect x="436" y="104" width="48" height="28" rx="6" fill="#EEECEA"/>
  <text x="460" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">목</text>
  <rect x="488" y="104" width="48" height="28" rx="6" fill="#1A6363" opacity="0.15" stroke="#1A6363" stroke-width="1"/>
  <text x="512" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1A6363">금</text>
  <rect x="540" y="104" width="48" height="28" rx="6" fill="#1A6363" opacity="0.10"/>
  <text x="564" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1A6363">토</text>
  <rect x="592" y="104" width="48" height="28" rx="6" fill="#1A6363" opacity="0.10"/>
  <text x="616" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1A6363">일</text>
  <rect x="644" y="104" width="48" height="28" rx="6" fill="#EEECEA"/>
  <text x="668" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">월</text>

  <rect x="436" y="144" width="112" height="24" rx="6" fill="#1A6363" opacity="0.07"/>
  <text x="492" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A6363">1일 = 3일 (3.0배)</text>
</svg>