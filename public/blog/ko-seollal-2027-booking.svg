<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <rect width="800" height="160" rx="16" fill="#1A6363"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFF" opacity="0.6" letter-spacing="1">예약 타임라인</text>

  <!-- Track -->
  <rect x="48" y="62" width="704" height="4" rx="2" fill="#FFF" opacity="0.12"/>

  <!-- Now marker -->
  <circle cx="120" cy="64" r="7" fill="#D95740"/>
  <circle cx="120" cy="64" r="3" fill="#FFF"/>
  <text x="120" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">지금</text>

  <!-- Sweet spot highlight -->
  <rect x="100" y="59" width="280" height="10" rx="5" fill="#FFF" opacity="0.18"/>

  <!-- Seollal marker -->
  <circle cx="700" cy="64" r="5" fill="#FFF" opacity="0.4"/>
  <text x="700" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFF" opacity="0.6">2/7</text>

  <!-- Booking windows -->
  <g font-family="system-ui, sans-serif" fill="#FFF">
    <!-- 일본행 -->
    <rect x="80" y="88" width="160" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="160" y="108" text-anchor="middle" font-size="12" font-weight="600">일본 항공권</text>
    <text x="160" y="124" text-anchor="middle" font-size="11" opacity="0.6">12월 예매 — 1월 +25%</text>

    <!-- 동남아행 -->
    <rect x="260" y="88" width="210" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="365" y="108" text-anchor="middle" font-size="12" font-weight="600">동남아 항공권</text>
    <text x="365" y="124" text-anchor="middle" font-size="11" opacity="0.6">지금이 최저 — 왕복 30~45만원</text>

    <!-- 괌/사이판 -->
    <rect x="490" y="88" width="184" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="582" y="108" text-anchor="middle" font-size="12" font-weight="600">괌·사이판</text>
    <text x="582" y="124" text-anchor="middle" font-size="11" opacity="0.6">좌석 적어 빨리 매진</text>
  </g>
</svg>