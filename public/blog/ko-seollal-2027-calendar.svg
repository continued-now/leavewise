<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="16" fill="#F7F6F2"/>
  <rect y="0" width="800" height="52" rx="16" fill="#1A6363"/>
  <rect y="28" width="800" height="24" fill="#1A6363"/>
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="600" fill="#FFF">2027년 설날 — 연차 배치 미리보기</text>

  <!-- Day headers row -->
  <g font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78716C" text-anchor="middle">
    <text x="56" y="80">금</text>
    <text x="140" y="80">토</text>
    <text x="224" y="80">일</text>
    <text x="308" y="80">월</text>
    <text x="392" y="80">화</text>
    <text x="476" y="80">수</text>
    <text x="560" y="80">목</text>
    <text x="644" y="80">금</text>
    <text x="740" y="80">토-일</text>
  </g>

  <!-- Feb 5 — 평일 (금) -->
  <rect x="24" y="92" width="64" height="88" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <text x="56" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#78716C">5</text>
  <text x="56" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">평일</text>

  <!-- Feb 6 — 설날연휴 (토) -->
  <rect x="104" y="92" width="72" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="140" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#D95740">6</text>
  <text x="140" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">설날</text>
  <text x="140" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">연휴</text>

  <!-- Feb 7 — 설날 (일) -->
  <rect x="188" y="92" width="72" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="224" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#D95740">7</text>
  <text x="224" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">설날</text>

  <!-- Feb 8 — 설날연휴 (월) -->
  <rect x="272" y="92" width="72" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="308" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#D95740">8</text>
  <text x="308" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">설날</text>
  <text x="308" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">연휴</text>

  <!-- Feb 9 — 대체공휴일 (화) -->
  <rect x="356" y="92" width="72" height="88" rx="12" fill="#EEF6F1" stroke="#4A7C5E" stroke-width="1.5"/>
  <text x="392" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#4A7C5E">9</text>
  <text x="392" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#4A7C5E">대체</text>
  <text x="392" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#4A7C5E">공휴일</text>

  <!-- Feb 10 — 연차 1 (수) -->
  <rect x="440" y="92" width="72" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="476" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">10</text>
  <text x="476" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">연차 1</text>

  <!-- Feb 11 — 연차 2 (목) -->
  <rect x="524" y="92" width="72" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="560" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">11</text>
  <text x="560" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">연차 2</text>

  <!-- Feb 12 — 연차 3 (금) -->
  <rect x="608" y="92" width="72" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="644" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">12</text>
  <text x="644" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">연차 3</text>

  <!-- Feb 13-14 — 주말 (토-일) -->
  <rect x="692" y="92" width="84" height="88" rx="12" fill="#EEECEA"/>
  <text x="734" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#78716C">13-14</text>
  <text x="734" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">주말</text>

  <!-- Divider -->
  <rect x="24" y="200" width="752" height="1" fill="#E5E2DA"/>

  <!-- Legend -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#44403C">
    <rect x="40" y="220" width="14" height="14" rx="4" fill="#E8F3F3" stroke="#1A6363" stroke-width="1"/>
    <text x="62" y="232">연차 (3일)</text>
    <rect x="170" y="220" width="14" height="14" rx="4" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
    <text x="192" y="232">공휴일</text>
    <rect x="280" y="220" width="14" height="14" rx="4" fill="#EEF6F1" stroke="#4A7C5E" stroke-width="1"/>
    <text x="302" y="232">대체공휴일</text>
    <rect x="420" y="220" width="14" height="14" rx="4" fill="#EEECEA"/>
    <text x="442" y="232">주말</text>
  </g>

  <!-- Result callout -->
  <rect x="24" y="256" width="752" height="56" rx="12" fill="#1A6363"/>
  <text x="400" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.75">연차 단 3일로</text>
  <text x="400" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="600" fill="#FFF">9일 연속 휴가 (2/6~14) — 3.0배 효율</text>
</svg>