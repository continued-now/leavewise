  <text x="304" y="169" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A6363">Peak season</text>

  <!-- Iceland -->
  <rect x="408" y="24" width="176" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="408" y="24" width="176" height="56" rx="12" fill="#FDF4E7"/>
  <rect x="408" y="68" width="176" height="12" fill="#FFF"/>
  <g transform="translate(496,34)">
