  <text x="112" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Yellowstone + Grand Teton</text>
  <text x="112" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">PCH road trip, 9 days</text>
  <rect x="56" y="152" width="112" height="26" rx="6" fill="#4A7C5E" opacity="0.07"/>
  <text x="112" y="169" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A7C5E">Classic summer</text>

  <!-- Alaska -->
  <rect x="216" y="24" width="176" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="216" y="24" width="176" height="56" rx="12" fill="#E8F3F3"/>
  <rect x="216" y="68" width="176" height="12" fill="#FFF"/>
  <g transform="translate(304,34)">
