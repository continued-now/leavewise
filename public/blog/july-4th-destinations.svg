    <path d="M-16 12C-12 8-8 12-4 8C0 4 4 8 8 4C12 0 16 4 16 4" stroke="#D95740" stroke-width="1.5" opacity="0.35" fill="none"/>
    <path d="M-16 18C-12 14-8 18-4 14C0 10 4 14 8 10C12 6 16 10 16 10" stroke="#D95740" stroke-width="1.5" opacity="0.35" fill="none"/>
