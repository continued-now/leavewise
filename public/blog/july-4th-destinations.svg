<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <rect width="800" height="220" rx="16" fill="#F7F6F2"/>

  <!-- National Parks -->
  <rect x="24" y="24" width="176" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="24" y="24" width="176" height="56" rx="12" fill="#EEF6F1"/>
  <rect x="24" y="68" width="176" height="12" fill="#FFF"/>
  <g transform="translate(112,28)">
