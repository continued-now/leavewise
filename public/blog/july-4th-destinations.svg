    <line x1="-14" y1="0" x2="-10" y2="0" stroke="#C4872A" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="0" x2="14" y2="0" stroke="#C4872A" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-14" x2="0" y2="-10" stroke="#C4872A" stroke-width="1.5" opacity="0.4"/>
