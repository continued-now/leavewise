<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <rect width="800" height="160" rx="16" fill="#1A6363"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFF" opacity="0.6" letter-spacing="1">PEAK FOLIAGE TIMING BY REGION</text>

  <!-- Timeline track -->
  <rect x="48" y="58" width="704" height="4" rx="2" fill="#FFF" opacity="0.12"/>

  <!-- Timeline labels -->
  <text x="48" y="52" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">Late Sep</text>
  <text x="224" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">Early Oct</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">Mid Oct</text>
  <text x="576" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">Late Oct</text>
  <text x="752" y="52" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">Nov</text>

  <!-- Tick marks -->
  <rect x="224" y="56" width="1" height="8" fill="#FFF" opacity="0.2"/>
  <rect x="400" y="56" width="1" height="8" fill="#FFF" opacity="0.2"/>
  <rect x="576" y="56" width="1" height="8" fill="#FFF" opacity="0.2"/>

  <!-- Columbus Day marker -->
  <circle cx="430" cy="60" r="5" fill="#FFF" opacity="0.4"/>
  <text x="430" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFF" opacity="0.5">Oct 12</text>

  <!-- New England block -->
  <rect x="160" y="86" width="190" height="44" rx="8" fill="#D95740" opacity="0.25" stroke="#D95740" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="255" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">New England</text>
  <text x="255" y="121" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FFF" opacity="0.6">Oct 1-18 -- VT, NH, MA</text>

  <!-- Mid-Atlantic block -->
  <rect x="340" y="86" width="190" height="44" rx="8" fill="#C4872A" opacity="0.25" stroke="#C4872A" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="435" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">Mid-Atlantic</text>
  <text x="435" y="121" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FFF" opacity="0.6">Oct 10-25 -- NY, VA</text>

  <!-- Southeast block -->
  <rect x="500" y="86" width="210" height="44" rx="8" fill="#4A7C5E" opacity="0.25" stroke="#4A7C5E" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="605" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">Southeast</text>
  <text x="605" y="121" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FFF" opacity="0.6">Oct 15-30 -- TN, NC, GA</text>
</svg>