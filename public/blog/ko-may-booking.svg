<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <rect width="800" height="160" rx="16" fill="#1A6363"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFF" opacity="0.6" letter-spacing="1">항공권 예약 타임라인</text>

  <!-- Track -->
  <rect x="48" y="62" width="704" height="4" rx="2" fill="#FFF" opacity="0.12"/>

  <!-- Month markers -->
  <g font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">
    <text x="48" y="52" text-anchor="middle">3월</text>
    <text x="283" y="52" text-anchor="middle">4월</text>
    <text x="518" y="52" text-anchor="middle">5월</text>
  </g>

  <!-- Month tick marks -->
  <g fill="#FFF" opacity="0.3">
    <rect x="47" y="58" width="2" height="12" rx="1"/>
    <rect x="282" y="58" width="2" height="12" rx="1"/>
    <rect x="517" y="58" width="2" height="12" rx="1"/>
  </g>

  <!-- Now marker (late March) -->
  <circle cx="220" cy="64" r="7" fill="#D95740"/>
  <circle cx="220" cy="64" r="3" fill="#FFF"/>
  <text x="220" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">지금</text>

  <!-- Sweet spot highlight (March to early April) -->
  <rect x="200" y="59" width="140" height="10" rx="5" fill="#FFF" opacity="0.18"/>

  <!-- 5/5 어린이날 marker -->
  <circle cx="553" cy="64" r="5" fill="#FFF" opacity="0.4"/>
  <text x="553" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFF" opacity="0.6">5/5 어린이날</text>

  <!-- Price climb indicators -->
  <g font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.45">
    <text x="400" y="56">+10~20%</text>
    <text x="620" y="56">+25~40%</text>
  </g>

  <!-- Booking windows -->
  <g font-family="system-ui, sans-serif" fill="#FFF">
    <!-- Sweet spot -->
    <rect x="48" y="88" width="260" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="178" y="108" text-anchor="middle" font-size="12" font-weight="600">최적 예약 구간</text>
    <text x="178" y="124" text-anchor="middle" font-size="11" opacity="0.6">3월 말~4월 초 — 지금이 최저가</text>

    <!-- April price rise -->
    <rect x="328" y="88" width="210" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="433" y="108" text-anchor="middle" font-size="12" font-weight="600">4월 중순 이후</text>
    <text x="433" y="124" text-anchor="middle" font-size="11" opacity="0.6">일본행 +10~20% 상승</text>

    <!-- May price surge -->
    <rect x="558" y="88" width="194" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="655" y="108" text-anchor="middle" font-size="12" font-weight="600">5월 직전</text>
    <text x="655" y="124" text-anchor="middle" font-size="11" opacity="0.6">제주 급등, 인기 노선 매진</text>
  </g>
</svg>