<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="16" fill="#F7F6F2"/>
  <rect y="0" width="800" height="52" rx="16" fill="#1A6363"/>
  <rect y="28" width="800" height="24" fill="#1A6363"/>
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="600" fill="#FFF">Dec 2026 - Jan 2027 — Your 10-Day Holiday Window</text>

  <!-- Day headers -->
  <g font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#78716C" text-anchor="middle">
    <text x="52" y="80">THU</text>
    <text x="128" y="80">FRI</text>
    <text x="216" y="80">SAT-SUN</text>
    <text x="306" y="80">MON</text>
    <text x="382" y="80">TUE</text>
    <text x="458" y="80">WED</text>
    <text x="534" y="80">THU</text>
    <text x="610" y="80">FRI</text>
    <text x="714" y="80">SAT-SUN</text>
  </g>

  <!-- Dec 24 — Christmas Eve -->
  <rect x="24" y="92" width="56" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="52" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#D95740">24</text>
  <text x="52" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Xmas Eve</text>

  <!-- Dec 25 — Christmas Day -->
  <rect x="88" y="92" width="80" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="128" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#D95740">25</text>
  <text x="128" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Christmas</text>

  <!-- Dec 26-27 — Weekend -->
  <rect x="176" y="92" width="80" height="88" rx="12" fill="#EEECEA"/>
  <text x="216" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#78716C">26-27</text>
  <text x="216" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Weekend</text>

  <!-- Dec 28 — PTO 1 -->
  <rect x="264" y="92" width="76" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="302" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#1A6363">28</text>
  <text x="302" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 1</text>

  <!-- Dec 29 — PTO 2 -->
  <rect x="344" y="92" width="76" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="382" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#1A6363">29</text>
  <text x="382" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 2</text>

  <!-- Dec 30 — PTO 3 -->
  <rect x="424" y="92" width="68" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="458" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#1A6363">30</text>
  <text x="458" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 3</text>

  <!-- Jan 1 — New Year's Day -->
  <rect x="500" y="92" width="68" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="534" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#D95740">1</text>
  <text x="534" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">New Year</text>
  <text x="534" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D95740" opacity="0.7">JAN</text>

  <!-- Jan 2 — Optional PTO -->
  <rect x="576" y="92" width="68" height="88" rx="12" fill="#F7F6F2" stroke="#E5E2DA" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="610" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#A8A29E">2</text>
  <text x="610" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">or PTO 4</text>

  <!-- Jan 3-4 — Weekend -->
  <rect x="652" y="92" width="124" height="88" rx="12" fill="#EEECEA"/>
  <text x="714" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#78716C">3-4</text>
  <text x="714" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Weekend</text>

  <!-- Divider -->
  <rect x="24" y="200" width="752" height="1" fill="#E5E2DA"/>

  <!-- Legend -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#44403C">
    <rect x="40" y="220" width="14" height="14" rx="4" fill="#E8F3F3" stroke="#1A6363" stroke-width="1"/>
    <text x="62" y="232">PTO days (3)</text>
    <rect x="200" y="220" width="14" height="14" rx="4" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
    <text x="222" y="232">Holidays</text>
    <rect x="330" y="220" width="14" height="14" rx="4" fill="#EEECEA"/>
    <text x="352" y="232">Weekends</text>
    <rect x="460" y="220" width="14" height="14" rx="4" fill="#F7F6F2" stroke="#E5E2DA" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="482" y="232">Optional PTO</text>
  </g>

  <!-- Result callout -->
  <rect x="24" y="256" width="752" height="56" rx="12" fill="#1A6363"/>
  <text x="400" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.75">Use just</text>
  <text x="400" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="600" fill="#FFF">3 PTO days to get 10 days off (Dec 24 - Jan 4) — 3.3x return</text>
</svg>