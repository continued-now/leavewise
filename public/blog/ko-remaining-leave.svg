<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <rect width="800" height="220" rx="16" fill="#F7F6F2"/>

  <!-- Card 1: 2일 남음 -->
  <rect x="24" y="24" width="240" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="24" y="24" width="240" height="44" rx="12" fill="#FEF0ED"/>
  <rect x="24" y="56" width="240" height="12" fill="#FFF"/>
  <text x="144" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#D95740">2일 남음</text>
  <text x="144" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1C1917">크리스마스 연휴 확장</text>
  <text x="144" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44403C">12/23(수) + 12/24(목) 연차</text>
  <text x="144" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">수~일 5일 연속 휴가</text>
  <rect x="68" y="144" width="152" height="28" rx="6" fill="#D95740" opacity="0.07"/>
  <text x="144" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#D95740">효율 2.5배</text>
  <text x="144" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">2일 → 5일</text>

  <!-- Card 2: 3일 남음 -->
  <rect x="280" y="24" width="240" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="280" y="24" width="240" height="44" rx="12" fill="#E8F3F3"/>
  <rect x="280" y="56" width="240" height="12" fill="#FFF"/>
  <text x="400" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#1A6363">3일 남음</text>
  <text x="400" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1C1917">연말 대연휴</text>
  <text x="400" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44403C">12/29(월)~12/31(수) 연차</text>
  <text x="400" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">크리스마스~신정 연결</text>
  <rect x="324" y="144" width="152" height="28" rx="6" fill="#1A6363" opacity="0.07"/>
  <text x="400" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1A6363">효율 3.3배</text>
  <text x="400" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">3일 → 10일</text>

  <!-- Card 3: 5일+ 남음 -->
  <rect x="536" y="24" width="240" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="536" y="24" width="240" height="44" rx="12" fill="#EEF6F1"/>
  <rect x="536" y="56" width="240" height="12" fill="#FFF"/>
  <text x="656" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#4A7C5E">5일+ 남음</text>
  <text x="656" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1C1917">11월 + 12월 분산</text>
  <text x="656" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44403C">11월 비수기 여행 2~3일</text>
  <text x="656" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">+ 크리스마스~연말 2~3일</text>
  <rect x="580" y="144" width="152" height="28" rx="6" fill="#4A7C5E" opacity="0.07"/>
  <text x="656" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#4A7C5E">가성비 최고</text>
  <text x="656" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">비수기 = 항공료 절약</text>
</svg>