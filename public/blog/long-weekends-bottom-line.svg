<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 800 160"><rect width="800" height="160" fill="#f7f6f2" rx="16"/><text x="400" y="20" fill="#1c1917" font-family="Georgia, serif" font-size="13" font-weight="700" letter-spacing=".5" text-anchor="middle">2026 AT A GLANCE</text><rect width="240" height="100" x="24" y="36" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="40" height="40" x="40" y="52" fill="#1a6363" opacity=".08" rx="8"/><text x="60" y="79" fill="#1a6363" font-family="Georgia, serif" font-size="20" font-weight="700" text-anchor="middle">11</text><text x="100" y="68" fill="#1c1917" font-family="Georgia, serif" font-size="14" font-weight="700">Federal Holidays</text><text x="100" y="84" fill="#78716c" font-family="system-ui, sans-serif" font-size="11">Multiple land on Mon/Thu</text><text x="100" y="100" fill="#78716c" font-family="system-ui, sans-serif" font-size="11">creating natural bridges</text><rect width="90" height="20" x="100" y="108" fill="#1a6363" opacity=".07" rx="4"/><text x="145" y="122" fill="#1a6363" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Strong year</text><rect width="240" height="100" x="280" y="36" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="40" height="40" x="296" y="52" fill="#d95740" opacity=".08" rx="8"/><text x="316" y="79" fill="#d95740" font-family="Georgia, serif" font-size="20" font-weight="700" text-anchor="middle">15</text><text x="356" y="68" fill="#1c1917" font-family="Georgia, serif" font-size="14" font-weight="700">PTO Days Needed</text><text x="356" y="84" fill="#78716c" font-family="system-ui, sans-serif" font-size="11">Strategically placed around</text><text x="356" y="100" fill="#78716c" font-family="system-ui, sans-serif" font-size="11">holidays and weekends</text><rect width="90" height="20" x="356" y="108" fill="#d95740" opacity=".07" rx="4"/><text x="401" y="122" fill="#d95740" font-family="system-ui, sans-serif" font-size="10" font-weight="6