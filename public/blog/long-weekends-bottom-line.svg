<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <rect width="800" height="160" rx="16" fill="#F7F6F2"/>

  <!-- Title -->
  <text x="400" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#1C1917" letter-spacing="0.5">2026 AT A GLANCE</text>

  <!-- Card 1: Total Holidays -->
  <rect x="24" y="36" width="240" height="100" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="40" y="52" width="40" height="40" rx="8" fill="#1A6363" opacity="0.08"/>
  <text x="60" y="79" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#1A6363">11</text>
  <text x="100" y="68" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1C1917">Federal Holidays</text>
  <text x="100" y="84" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Multiple land on Mon/Thu</text>
  <text x="100" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">creating natural bridges</text>
  <rect x="100" y="108" width="90" height="20" rx="4" fill="#1A6363" opacity="0.07"/>
  <text x="145" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1A6363">Strong year</text>

  <!-- Card 2: Optimal PTO -->
  <rect x="280" y="36" width="240" height="100" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="296" y="52" width="40" height="40" rx="8" fill="#D95740" opacity="0.08"/>
  <text x="316" y="79" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#D95740">15</text>
  <text x="356" y="68" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1C1917">PTO Days Needed</text>
  <text x="356" y="84" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Strategically placed around</text>
  <text x="356" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">holidays and weekends</text>
  <rect x="356" y="108" width="90" height="20" rx="4" fill="#D95740" opacity="0.07"/>
  <text x="401" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Avg US budget</text>

  <!-- Card 3: Max Days Off -->
  <rect x="536" y="36" width="240" height="100" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="552" y="52" width="50" height="40" rx="8" fill="#4A7C5E" opacity="0.08"/>
  <text x="577" y="79" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#4A7C5E">35-40</text>
  <text x="616" y="68" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1C1917">Total Days Off</text>
  <text x="616" y="84" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">More than double what</text>
  <text x="616" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">random weeks would give</text>
  <rect x="616" y="108" width="90" height="20" rx="4" fill="#4A7C5E" opacity="0.07"/>
  <text x="661" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#4A7C5E">2x+ multiplier</text>
</svg>