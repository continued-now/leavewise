<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 800 220"><rect width="800" height="220" fill="#f7f6f2" rx="16"/><rect width="236" height="172" x="24" y="24" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="236" height="48" x="24" y="24" fill="#fef0ed" rx="12"/><path fill="#fff" d="M24 60h236v12H24z"/><text x="142" y="56" fill="#d95740" font-family="Georgia, serif" font-size="14" font-weight="700" text-anchor="middle">비상용으로만 인식</text><text x="142" y="88" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">연차는 아플 때만 쓰는 것이라는</text><text x="142" y="104" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">인식이 여전히 남아있음</text><rect width="180" height="28" x="52" y="128" fill="#d95740" opacity=".07" rx="6"/><text x="142" y="146" fill="#d95740" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">해결: 1월에 미리 블로킹</text><rect width="236" height="172" x="282" y="24" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="236" height="48" x="282" y="24" fill="#fdf4e7" rx="12"/><path fill="#fff" d="M282 60h236v12H282z"/><text x="400" y="56" fill="#c4872a" font-family="Georgia, serif" font-size="14" font-weight="700" text-anchor="middle">연차 촉진 정책 부재</text><text x="400" y="88" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">회사가 연차 사용을 적극적으로</text><text x="400" y="104" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">독려하지 않는 조직 문화</text><rect width="180" height="28" x="310" y="128" fill="#c4872a" opacity=".07" rx="6"/><text x="400" y="146" fill="#c4872a" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">해결: 촉진제도 활용 요청</text><rect width="236" height="172" x="540" y="24" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="236" height="48" x="540" y="24" fill="#e8f3f3" rx="12"/><path fill="#fff" d="M540 60h236v12H540z"/><text x="658" y="56" fill="#1a6363" font-family="Georgia, serif" font-size="14" font-weight="700" text-anchor="middle">팀 눈치 문화</text><text x="658" y="88" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">다들 안 쓰는데 나만 쓰기</text><text x="658" y="104" fill="#44403c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">미안한 분위기가 사용을 억제</text><rect width="180" height="28" x="568" y="128" fill="#1a6363" opacity=".07" rx="6"/><text x="658" y="146" fill="#1a6363" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">해결: 내가 첫 번째가 되기</text></svg>