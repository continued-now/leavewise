<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <rect width="800" height="160" rx="16" fill="#1A6363"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFF" opacity="0.6" letter-spacing="1">Q4 BOOKING TIMELINE</text>

  <!-- Track -->
  <rect x="48" y="62" width="704" height="4" rx="2" fill="#FFF" opacity="0.12"/>

  <!-- Price climb gradient bar -->
  <rect x="120" y="60" width="584" height="8" rx="4" fill="#D95740" opacity="0.25"/>
  <rect x="120" y="60" width="200" height="8" rx="4" fill="#FFF" opacity="0.15"/>

  <!-- Now marker -->
  <circle cx="120" cy="64" r="7" fill="#D95740"/>
  <circle cx="120" cy="64" r="3" fill="#FFF"/>
  <text x="120" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">NOW</text>

  <!-- October marker -->
  <circle cx="120" cy="64" r="2" fill="#FFF"/>
  <text x="120" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">OCT</text>

  <!-- November marker -->
  <circle cx="400" cy="64" r="4" fill="#FFF" opacity="0.4"/>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFF" opacity="0.6">NOV</text>

  <!-- December marker -->
  <circle cx="680" cy="64" r="4" fill="#FFF" opacity="0.4"/>
  <text x="680" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFF" opacity="0.6">DEC</text>

  <!-- Booking windows -->
  <g font-family="system-ui, sans-serif" fill="#FFF">
    <!-- Best prices -->
    <rect x="80" y="92" width="180" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="170" y="112" text-anchor="middle" font-size="12" font-weight="600">Best prices</text>
    <text x="170" y="128" text-anchor="middle" font-size="11" opacity="0.6">Book now for Nov travel</text>

    <!-- Prices climbing -->
    <rect x="280" y="92" width="220" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="390" y="112" text-anchor="middle" font-size="12" font-weight="600">+15-25% premium</text>
    <text x="390" y="128" text-anchor="middle" font-size="11" opacity="0.6">Nov bookings for Dec travel</text>

    <!-- Last minute -->
    <rect x="520" y="92" width="200" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="620" y="112" text-anchor="middle" font-size="12" font-weight="600">+30-50% surge</text>
    <text x="620" y="128" text-anchor="middle" font-size="11" opacity="0.6">Last minute, low availability</text>
  </g>
</svg>