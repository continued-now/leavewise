<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <rect width="800" height="200" rx="16" fill="#F7F6F2"/>

  <!-- Card 1: Slow Travel -->
  <rect x="24" y="24" width="240" height="152" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="24" y="24" width="240" height="48" rx="12" fill="#E8F3F3"/>
  <rect x="24" y="60" width="240" height="12" fill="#FFF"/>
  <!-- Globe icon -->
  <g transform="translate(144,30)">
    <circle r="14" fill="none" stroke="#1A6363" stroke-width="1.5" opacity="0.5"/>
    <ellipse rx="8" ry="14" fill="none" stroke="#1A6363" stroke-width="1.2" opacity="0.4"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#1A6363" stroke-width="1" opacity="0.35"/>
    <line x1="-12" y1="-7" x2="12" y2="-7" stroke="#1A6363" stroke-width="0.8" opacity="0.3"/>
    <line x1="-12" y1="7" x2="12" y2="7" stroke="#1A6363" stroke-width="0.8" opacity="0.3"/>
  </g>
  <text x="144" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Slow Travel</text>
  <text x="144" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Work remotely from abroad,</text>
  <text x="144" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">sprinkle PTO days around it</text>
  <rect x="72" y="140" width="144" height="24" rx="6" fill="#1A6363" opacity="0.07"/>
  <text x="144" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A6363">3 days = 12 days away</text>

  <!-- Card 2: Reset Monday -->
  <rect x="280" y="24" width="240" height="152" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="280" y="24" width="240" height="48" rx="12" fill="#FEF0ED"/>
  <rect x="280" y="60" width="240" height="12" fill="#FFF"/>
  <!-- Calendar icon -->
  <g transform="translate(400,30)">
    <rect x="-13" y="-8" width="26" height="22" rx="3" fill="none" stroke="#D95740" stroke-width="1.5" opacity="0.5"/>
    <line x1="-8" y1="-8" x2="-8" y2="-13" stroke="#D95740" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="8" y2="-13" stroke="#D95740" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="-13" y1="-2" x2="13" y2="-2" stroke="#D95740" stroke-width="1" opacity="0.35"/>
    <rect x="-8" y="2" width="5" height="4" rx="1" fill="#D95740" opacity="0.4"/>
  </g>
  <text x="400" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Reset Monday</text>
  <text x="400" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Take Mondays off regularly</text>
  <text x="400" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">to break the burnout cycle</text>
  <rect x="328" y="140" width="144" height="24" rx="6" fill="#D95740" opacity="0.07"/>
  <text x="400" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#D95740">6-8 long weekends/yr</text>

  <!-- Card 3: Holiday Stacking -->
  <rect x="536" y="24" width="240" height="152" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="536" y="24" width="240" height="48" rx="12" fill="#EEF6F1"/>
  <rect x="536" y="60" width="240" height="12" fill="#FFF"/>
  <!-- Stack icon -->
  <g transform="translate(656,30)">
    <rect x="-14" y="4" width="28" height="6" rx="2" fill="#4A7C5E" opacity="0.35"/>
    <rect x="-12" y="-3" width="24" height="6" rx="2" fill="#4A7C5E" opacity="0.45"/>
    <rect x="-10" y="-10" width="20" height="6" rx="2" fill="#4A7C5E" opacity="0.55"/>
  </g>
  <text x="656" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Holiday Stacking</text>
  <text x="656" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Bridge every holiday weekend</text>
  <text x="656" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">with flexible PTO placement</text>
  <rect x="584" y="140" width="144" height="24" rx="6" fill="#4A7C5E" opacity="0.07"/>
  <text x="656" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A7C5E">12 days = 49 days off</text>
</svg>