<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 800 200"><rect width="800" height="200" fill="#f7f6f2" rx="16"/><rect width="240" height="152" x="24" y="24" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="240" height="48" x="24" y="24" fill="#e8f3f3" rx="12"/><path fill="#fff" d="M24 60h240v12H24z"/><g stroke="#1a6363" transform="translate(144 30)"><circle r="14" stroke-width="1.5" opacity=".5"/><ellipse stroke-width="1.2" opacity=".4" rx="8" ry="14"/><path d="M-14 0h28" opacity=".35"/><path stroke-width=".8" d="M-12-7h24M-12 7h24" opacity=".3"/></g><text x="144" y="88" fill="#1c1917" font-family="Georgia, serif" font-size="15" font-weight="700" text-anchor="middle">Slow Travel</text><text x="144" y="108" fill="#78716c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Work remotely from abroad,</text><text x="144" y="124" fill="#78716c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">sprinkle PTO days around it</text><rect width="144" height="24" x="72" y="140" fill="#1a6363" opacity=".07" rx="6"/><text x="144" y="156" fill="#1a6363" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">3 days = 12 days away</text><rect width="240" height="152" x="280" y="24" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="240" height="48" x="280" y="24" fill="#fef0ed" rx="12"/><path fill="#fff" d="M280 60h240v12H280z"/><g transform="translate(400 30)"><rect width="26" height="22" x="-13" y="-8" stroke="#d95740" stroke-width="1.5" opacity=".5" rx="3"/><path stroke="#d95740" stroke-linecap="round" stroke-width="1.5" d="M-8-8v-5M8-8v-5" opacity=".5"/><path stroke="#d95740" d="M-13-2h26" opacity=".35"/><rect width="5" height="4" x="-8" y="2" fill="#d95740" opacity=".4" rx="1"/></g><text x="400" y="88" fill="#1c1917" font-family="Georgia, serif" font-size="15" font-weight="700" text-anchor="middle">Reset Monday</text><text x="400" y="108" fill="#78716c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Take Mondays off regularly</text><text x="400" y="124" fill="#78716c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">to break the burnout cycle</text><rect width="144" height="24" x="328" y="140" fill="#d95740" opacity=".07" rx="6"/><text x="400" y="156" fill="#d95740" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">6-8 long weekends/yr</text><rect width="240" height="152" x="536" y="24" fill="#fff" stroke="#e5e2da" rx="12"/><rect width="240" height="48" x="536" y="24" fill="#eef6f1" rx="12"/><path fill="#fff" d="M536 60h240v12H536z"/><g fill="#4a7c5e" transform="translate(656 30)"><rect width="28" height="6" x="-14" y="4" opacity=".35" rx="2"/><rect width="24" height="6" x="-12" y="-3" opacity=".45" rx="2"/><rect width="20" height="6" x="-10" y="-10" opacity=".55" rx="2"/></g><text x="656" y="88" fill="#1c1917" font-family="Georgia, serif" font-size="15" font-weight="700" text-anchor="middle">Holiday Stacking</text><text x="656" y="108" fill="#78716c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Bridge every holiday weekend</text><text x="656" y="124" fill="#78716c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">with flexible PTO placement</text><rect width="144" height="24" x="584" y="140" fill="#4a7c5e" opacity=".07" rx="6"/><text x="656" y="156" fill="#4a7c5e" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">12 days = 49 days off</text></svg>