    <circle cx="8.5" cy="-2.5" r="4.5" fill="#F2A897" opacity="0.5"/>
    <circle cx="5.3" cy="7" r="4.5" fill="#F2A897" opacity="0.6"/>
    <circle cx="-5.3" cy="7" r="4.5" fill="#F2A897" opacity="0.5"/>
    <circle cx="-8.5" cy="-2.5" r="4.5" fill="#F2A897" opacity="0.6"/>
