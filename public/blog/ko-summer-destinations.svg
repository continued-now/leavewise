    <path d="M0 20C-7 11-19 13-15 18C-12 14-5 14 0 20Z" fill="#4A7C5E" opacity="0.4"/>
    <path d="M0 20C7 11 19 13 15 18C12 14 5 14 0 20Z" fill="#4A7C5E" opacity="0.4"/>
    <path d="M0 18C-3 8-14 6-12 12C-9 9-3 10 0 18Z" fill="#4A7C5E" opacity="0.35"/>
    <path d="M0 18C3 8 14 6 12 12C9 9 3 10 0 18Z" fill="#4A7C5E" opacity="0.35"/>
  </g>
  <text x="304" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">유럽</text>
  <text x="304" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">8월보다 저렴한 7월</text>
  <text x="304" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">바르셀로나·두브로브니크</text>
