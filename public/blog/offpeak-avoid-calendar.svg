<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 800 310"><rect width="800" height="310" fill="#f7f6f2" rx="16"/><text x="400" y="28" fill="#1c1917" font-family="Georgia, serif" font-size="16" font-weight="700" text-anchor="middle">Annual Crowd Calendar — Find the Gaps</text><text x="400" y="46" fill="#78716c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Korean holidays (coral) + local holidays (amber) — sweet spots are the gaps (teal)</text><g fill="#57534e" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle"><text x="84" y="72">Jan</text><text x="144" y="72">Feb</text><text x="204" y="72">Mar</text><text x="264" y="72">Apr</text><text x="324" y="72">May</text><text x="384" y="72">Jun</text><text x="444" y="72">Jul</text><text x="504" y="72">Aug</text><text x="564" y="72">Sep</text><text x="624" y="72">Oct</text><text x="684" y="72">Nov</text><text x="744" y="72">Dec</text></g><line x1="54" x2="774" y1="78" y2="78" stroke="#d6d3cc" stroke-width="1"/><text x="36" y="102" fill="#d95740" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" transform="rotate(-90 36 102)">Korean</text><rect x="54" y="84" width="720" height="32" fill="#fff" stroke="#e5e2da" rx="4"/><rect x="124" y="86" width="40" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="144" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">Seollal</text><rect x="304" y="86" width="40" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="324" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">May GW</text><rect x="424" y="86" width="80" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="464" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">Summer</text><rect x="544" y="86" width="50" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="569" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">Chuseok</text><rect x="714" y="86" width="48" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="738" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">Year-end</text><text x="36" y="148" fill="#c4872a" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" transform="rotate(-90 36 148)">Local</text><rect x="54" y="124" width="720" height="32" fill="#fff" stroke="#e5e2da" rx="4"/><rect x="72" y="126" width="30" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="87" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">Shogatsu</text><rect x="114" y="126" width="50" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="139" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">LNY/CNY</text><rect x="196" y="126" width="24" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="208" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">Nyepi</text><rect x="244" y="126" width="34" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="261" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">Songkran</text><rect x="283" y="126" width="28" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="297" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">JP GW</text><rect x="424" y="126" width="50" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="449" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">EU Summer</text><rect x="480" y="126" width="30" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="495" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">Obon</text><rect x="550" y="126" width="30" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="565" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">Silver Wk</text><rect x="604" y="126" width="40" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="624" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">China GW</text><rect x="714" y="126" width="48" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="738" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">Christmas</text><text x="36" y="190" fill="#1a6363" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" transform="rotate(-90 36 190)">Sweet Spots</text><rect x="54" y="164" width="720" height="32" fill="#fff" stroke="#e5e2da" rx="4"/><rect x="170" y="166" width="65" height="28" fill="#1a6363" opacity=".2" rx="3"/><text x="202" y="184" fill="#1a6363" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">March</text><rect x="355" y="166" width="60" height="28" fill="#1a6363" opacity=".2" rx="3"/><text x="385" y="184" fill="#1a6363" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">June</text><rect x="520" y="166" width="20" height="28" fill="#1a6363" opacity=".2" rx="3"/><rect x="590" y="166" width="15" height="28" fill="#1a6363" opacity=".2" rx="3"/><rect x="650" y="166" width="55" height="28" fill="#1a6363" opacity=".2" rx="3"/><text x="677" y="184" fill="#1a6363" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">November</text><rect x="30" y="210" width="740" height="90" fill="#fff" stroke="#e5e2da" rx="8"/><text x="400" y="232" fill="#1c1917" font-family="Georgia, serif" font-size="13" font-weight="700" text-anchor="middle">Key Insight</text><g fill="#57534e" font-family="system-ui, sans-serif" font-size="11"><text x="60" y="254">March — Seollal/CNY over, before Songkran/Golden Week. Best value for most destinations.</text><text x="60" y="272">June — No Korean holidays + pre-Obon in Japan + pre-European summer. Widest sweet spot.</text><text x="60" y="290">November — Post-Chuseok, pre-Christmas. Thailand/Vietnam dry season starts, Japan autumn foliage.</text></g></svg>