<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <rect width="800" height="260" rx="16" fill="#F7F6F2"/>

  <!-- Title bar -->
  <rect y="0" width="800" height="48" rx="16" fill="#1A6363"/>
  <rect y="24" width="800" height="24" fill="#1A6363"/>
  <text x="400" y="33" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#FFF">2026 Long Weekend Map — Holidays &amp; Efficiency</text>

  <!-- Row 1: Jan-Jun -->
  <g font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#44403C" text-anchor="middle">
    <text x="84" y="72">JAN</text>
    <text x="208" y="72">FEB</text>
    <text x="332" y="72">APR</text>
    <text x="456" y="72">MAY</text>
    <text x="580" y="72">JUL</text>
    <text x="704" y="72">SEP</text>
  </g>

  <!-- Jan: NYD + MLK -->
  <rect x="24" y="82" width="120" height="48" rx="8" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
  <circle cx="54" cy="100" r="5" fill="#D95740"/>
  <circle cx="78" cy="100" r="5" fill="#D95740"/>
  <text x="106" y="104" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#D95740">4.0x</text>
  <text x="54" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">NYD</text>
  <text x="78" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">MLK</text>

  <!-- Feb: Presidents -->
  <rect x="148" y="82" width="120" height="48" rx="8" fill="#E8F3F3" stroke="#1A6363" stroke-width="1"/>
  <circle cx="196" cy="100" r="5" fill="#1A6363"/>
  <text x="220" y="104" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1A6363">2.5x</text>
  <text x="196" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Pres. Day</text>

  <!-- Apr: Easter -->
  <rect x="272" y="82" width="120" height="48" rx="8" fill="#E8F3F3" stroke="#1A6363" stroke-width="1"/>
  <circle cx="320" cy="100" r="5" fill="#1A6363"/>
  <text x="344" y="104" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1A6363">2.5x</text>
  <text x="320" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Easter</text>

  <!-- May: Memorial -->
  <rect x="396" y="82" width="120" height="48" rx="8" fill="#EEF6F1" stroke="#4A7C5E" stroke-width="1"/>
  <circle cx="444" cy="100" r="5" fill="#4A7C5E"/>
  <text x="468" y="104" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#4A7C5E">2.3x</text>
  <text x="444" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Memorial</text>

  <!-- Jul: Independence -->
  <rect x="520" y="82" width="120" height="48" rx="8" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
  <circle cx="568" cy="100" r="5" fill="#D95740"/>
  <text x="592" y="104" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#D95740">2.3x</text>
  <text x="568" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Jul 4th</text>

  <!-- Sep: Labor -->
  <rect x="644" y="82" width="120" height="48" rx="8" fill="#EEF6F1" stroke="#4A7C5E" stroke-width="1"/>
  <circle cx="692" cy="100" r="5" fill="#4A7C5E"/>
  <text x="716" y="104" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#4A7C5E">2.3x</text>
  <text x="692" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Labor</text>

  <!-- Row 2: Oct-Dec -->
  <g font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#44403C" text-anchor="middle">
    <text x="84" y="152">OCT</text>
    <text x="246" y="152">NOV</text>
    <text x="456" y="152">DEC</text>
  </g>

  <!-- Oct: Columbus -->
  <rect x="24" y="162" width="120" height="48" rx="8" fill="#EEF6F1" stroke="#4A7C5E" stroke-width="1"/>
  <circle cx="72" cy="180" r="5" fill="#4A7C5E"/>
  <text x="96" y="184" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#4A7C5E">4.0x</text>
  <text x="72" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Columbus</text>

  <!-- Nov: Veterans + Thanksgiving -->
  <rect x="148" y="162" width="196" height="48" rx="8" fill="#FDF4E7" stroke="#C4872A" stroke-width="1"/>
  <circle cx="208" cy="180" r="5" fill="#C4872A"/>
  <circle cx="284" cy="180" r="5" fill="#C4872A"/>
  <text x="324" y="184" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#C4872A">3.0x</text>
  <text x="208" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Veterans</text>
  <text x="284" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Thxgiving</text>

  <!-- Dec: Christmas + NYE -->
  <rect x="348" y="162" width="216" height="48" rx="8" fill="#FDF4E7" stroke="#C4872A" stroke-width="1"/>
  <circle cx="416" cy="180" r="5" fill="#C4872A"/>
  <circle cx="496" cy="180" r="5" fill="#C4872A"/>
  <text x="540" y="184" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#C4872A">3.3x</text>
  <text x="416" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Christmas</text>
  <text x="496" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">NYE</text>

  <!-- Bottom callout -->
  <rect x="24" y="224" width="752" height="24" rx="8" fill="#1A6363"/>
  <text x="400" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="600" fill="#FFF">15 PTO days strategically placed = 35-40 total days off in 2026</text>
</svg>