  <g font-family="system-ui, sans-serif" font-size="11" fill="#44403C">
    <rect x="40" y="380" width="14" height="14" rx="4" fill="#E8F3F3" stroke="#1A6363" stroke-width="1"/>
    <text x="62" y="392">연차</text>
    <rect x="130" y="380" width="14" height="14" rx="4" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
    <text x="152" y="392">공휴일</text>
    <rect x="230" y="380" width="14" height="14" rx="4" fill="#EEF6F1" stroke="#4A7C5E" stroke-width="1"/>
    <text x="252" y="392">대체공휴일</text>
    <rect x="360" y="380" width="14" height="14" rx="4" fill="#EEECEA"/>
    <text x="382" y="392">주말</text>
  </g>
