  <rect x="530" y="286" width="240" height="44" rx="10" fill="#1A6363"/>
  <text x="650" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.75">연차 1일로</text>
  <text x="650" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="600" fill="#FFF">4일 연속 = 4.0배</text>

