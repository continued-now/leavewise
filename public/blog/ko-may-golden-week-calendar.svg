  <rect x="276" y="112" width="104" height="80" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="328" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#1A6363">4</text>
  <text x="328" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">연차</text>

