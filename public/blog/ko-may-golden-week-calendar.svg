  <text x="328" y="298" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#D95740">24</text>
  <text x="328" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">부처님</text>
  <text x="328" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">오신날</text>

