<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <rect width="800" height="420" rx="16" fill="#F7F6F2"/>
  <rect y="0" width="800" height="52" rx="16" fill="#1A6363"/>
  <rect y="28" width="800" height="24" fill="#1A6363"/>
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="600" fill="#FFF">2026년 5월 — 어린이날 + 부처님오신날 연차 전략</text>

  <!-- === Row 1: Children's Day Window (5/2 - 5/5) === -->
  <text x="40" y="82" font-family="Georgia, serif" font-size="14" font-weight="600" fill="#1C1917">어린이날 주간</text>

  <!-- Day headers row 1 -->
  <g font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78716C" text-anchor="middle">
    <text x="108" y="102">토</text>
    <text x="218" y="102">일</text>
    <text x="328" y="102">월</text>
    <text x="438" y="102">화</text>
  </g>

  <!-- 5/2 Sat — Weekend -->
  <rect x="56" y="112" width="104" height="80" rx="12" fill="#EEECEA"/>
  <text x="108" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#78716C">2</text>
  <text x="108" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">주말</text>

  <!-- 5/3 Sun — Weekend -->
  <rect x="166" y="112" width="104" height="80" rx="12" fill="#EEECEA"/>
  <text x="218" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#78716C">3</text>
