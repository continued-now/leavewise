  <rect x="386" y="270" width="104" height="80" rx="12" fill="#EEF6F1" stroke="#4A7C5E" stroke-width="1.5"/>
  <text x="438" y="298" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#4A7C5E">25</text>
  <text x="438" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#4A7C5E">대체공휴일</text>

