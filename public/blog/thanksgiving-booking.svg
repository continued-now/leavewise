<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <rect width="800" height="160" rx="16" fill="#1A6363"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFF" opacity="0.6" letter-spacing="1">BOOKING TIMELINE</text>

  <!-- Track -->
  <rect x="48" y="62" width="704" height="4" rx="2" fill="#FFF" opacity="0.12"/>

  <!-- Now marker -->
  <circle cx="120" cy="64" r="7" fill="#D95740"/>
  <circle cx="120" cy="64" r="3" fill="#FFF"/>
  <text x="120" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">NOW</text>

  <!-- Sweet spot highlight -->
  <rect x="100" y="59" width="260" height="10" rx="5" fill="#FFF" opacity="0.18"/>

  <!-- Thanksgiving marker -->
  <circle cx="700" cy="64" r="5" fill="#FFF" opacity="0.4"/>
  <text x="700" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFF" opacity="0.6">NOV 26</text>

  <!-- Booking windows -->
  <g font-family="system-ui, sans-serif" fill="#FFF">
    <!-- September -->
    <rect x="80" y="88" width="180" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="170" y="108" text-anchor="middle" font-size="12" font-weight="600">Sep: Best prices</text>
    <text x="170" y="124" text-anchor="middle" font-size="11" opacity="0.6">Baseline — book now</text>

    <!-- October -->
    <rect x="280" y="88" width="180" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="370" y="108" text-anchor="middle" font-size="12" font-weight="600">Oct: +5-10%</text>
    <text x="370" y="124" text-anchor="middle" font-size="11" opacity="0.6">Still reasonable</text>

    <!-- November -->
    <rect x="480" y="88" width="200" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="580" y="108" text-anchor="middle" font-size="12" font-weight="600">Nov: +15-50%</text>
    <text x="580" y="124" text-anchor="middle" font-size="11" opacity="0.6">Week-of can be +50%</text>
  </g>
</svg>