<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <rect width="800" height="160" rx="16" fill="#1A6363"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFF" opacity="0.6" letter-spacing="1">BOOKING TIMELINE</text>

  <!-- Track -->
  <rect x="48" y="62" width="704" height="4" rx="2" fill="#FFF" opacity="0.12"/>

  <!-- Timeline labels -->
  <text x="48" y="54" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">March</text>
  <text x="224" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">April</text>
  <text x="460" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">Early May</text>
  <text x="635" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.5">Mid May</text>

  <!-- Tick marks -->
  <rect x="224" y="60" width="1" height="8" fill="#FFF" opacity="0.2"/>
  <rect x="460" y="60" width="1" height="8" fill="#FFF" opacity="0.2"/>
  <rect x="635" y="60" width="1" height="8" fill="#FFF" opacity="0.2"/>

  <!-- Now marker -->
  <circle cx="100" cy="64" r="7" fill="#D95740"/>
  <circle cx="100" cy="64" r="3" fill="#FFF"/>
  <text x="100" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">NOW</text>

  <!-- Sweet spot highlight -->
  <rect x="80" y="59" width="350" height="10" rx="5" fill="#FFF" opacity="0.18"/>

  <!-- Memorial Day marker -->
  <circle cx="720" cy="64" r="5" fill="#FFF" opacity="0.4"/>
  <text x="720" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFF" opacity="0.6">MAY 25</text>

  <!-- Booking windows -->
  <g font-family="system-ui, sans-serif" fill="#FFF">
    <!-- Domestic flights -->
    <rect x="70" y="88" width="170" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="155" y="108" text-anchor="middle" font-size="12" font-weight="600">Domestic flights</text>
    <text x="155" y="124" text-anchor="middle" font-size="11" opacity="0.6">Book now — best rates</text>

    <!-- International flights -->
    <rect x="258" y="88" width="210" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="363" y="108" text-anchor="middle" font-size="12" font-weight="600">International flights</text>
    <text x="363" y="124" text-anchor="middle" font-size="11" opacity="0.6">6-8 weeks out — sweet spot</text>

    <!-- Hotels -->
    <rect x="486" y="88" width="190" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="581" y="108" text-anchor="middle" font-size="12" font-weight="600">Hotels</text>
    <text x="581" y="124" text-anchor="middle" font-size="11" opacity="0.6">Book refundable now</text>
  </g>
</svg>