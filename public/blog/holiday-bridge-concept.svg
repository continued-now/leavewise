<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <rect width="800" height="200" rx="16" fill="#F7F6F2"/>

  <!-- Left block: Weekend -->
  <rect x="80" y="100" width="140" height="60" rx="12" fill="#EEECEA" stroke="#E5E2DA" stroke-width="1"/>
  <text x="150" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#78716C">Weekend</text>
  <text x="150" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Sat - Sun</text>

  <!-- Bridge PTO block -->
  <rect x="248" y="100" width="110" height="60" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="303" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1A6363">1 PTO Day</text>
  <text x="303" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A6363">Mon or Fri</text>

  <!-- Right block: Holiday -->
  <rect x="386" y="100" width="140" height="60" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
  <text x="456" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#D95740">Holiday</text>
  <text x="456" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#D95740">Federal day off</text>

  <!-- Bridge arch -->
  <path d="M220 104 Q303 30 386 104" stroke="#1A6363" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Bridge label -->
  <rect x="265" y="48" width="76" height="24" rx="6" fill="#1A6363"/>
  <text x="303" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFF">Bridge</text>

  <!-- Equals sign -->
  <text x="556" y="134" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#44403C">=</text>

  <!-- Result block -->
  <rect x="590" y="88" width="180" height="80" rx="12" fill="#1A6363"/>
  <text x="680" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#FFF">4 Days Off</text>
  <text x="680" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFF" opacity="0.7">for just 1 PTO day</text>
  <text x="680" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF" opacity="0.9">4.0x return</text>

  <!-- Top label -->
  <text x="303" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78716C" letter-spacing="1">HOW A HOLIDAY BRIDGE WORKS</text>
</svg>