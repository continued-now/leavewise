<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <rect width="800" height="220" rx="16" fill="#F7F6F2"/>

  <!-- 5 Days Card -->
  <rect x="24" y="24" width="240" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="24" y="24" width="240" height="48" rx="12" fill="#E8F3F3"/>
  <rect x="24" y="60" width="240" height="12" fill="#FFF"/>
  <rect x="112" y="32" width="44" height="28" rx="14" fill="#1A6363"/>
  <text x="134" y="51" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#FFF">5</text>
  <text x="144" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Starter</text>
  <text x="144" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">2 long weekends</text>
  <text x="144" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Memorial Day + Thanksgiving</text>
  <rect x="68" y="142" width="152" height="26" rx="6" fill="#1A6363" opacity="0.07"/>
  <text x="144" y="159" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A6363">Up to 18 days off</text>

  <!-- 10 Days Card -->
  <rect x="280" y="24" width="240" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="280" y="24" width="240" height="48" rx="12" fill="#EEF6F1"/>
  <rect x="280" y="60" width="240" height="12" fill="#FFF"/>
  <rect x="364" y="32" width="52" height="28" rx="14" fill="#4A7C5E"/>
  <text x="390" y="51" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#FFF">10</text>
  <text x="400" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Extended</text>
  <text x="400" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">3 extended breaks</text>
  <text x="400" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Add Christmas + one more</text>
  <rect x="324" y="142" width="152" height="26" rx="6" fill="#4A7C5E" opacity="0.07"/>
  <text x="400" y="159" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A7C5E">Up to 27 days off</text>

  <!-- 15 Days Card -->
  <rect x="536" y="24" width="240" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="536" y="24" width="240" height="48" rx="12" fill="#FEF0ED"/>
  <rect x="536" y="60" width="240" height="12" fill="#FFF"/>
  <rect x="620" y="32" width="52" height="28" rx="14" fill="#D95740"/>
  <text x="646" y="51" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#FFF">15</text>
  <text x="656" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Full Coverage</text>
  <text x="656" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Every major holiday covered</text>
  <text x="656" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">+ summer escape window</text>
  <rect x="580" y="142" width="152" height="26" rx="6" fill="#D95740" opacity="0.07"/>
  <text x="656" y="159" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#D95740">35-40 days off</text>
