<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="16" fill="#F7F6F2"/>
  <rect y="0" width="800" height="52" rx="16" fill="#1A6363"/>
  <rect y="28" width="800" height="24" fill="#1A6363"/>
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="600" fill="#FFF">April 2026 — Your 10-Day Window</text>

  <!-- Day headers row -->
  <g font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78716C" text-anchor="middle">
    <text x="62" y="80">FRI</text>
    <text x="144" y="80">SAT</text>
    <text x="226" y="80">SUN</text>
    <text x="308" y="80">MON</text>
    <text x="390" y="80">TUE</text>
    <text x="472" y="80">WED</text>
    <text x="554" y="80">THU</text>
    <text x="636" y="80">FRI</text>
    <text x="730" y="80">SAT-SUN</text>
  </g>

  <!-- Apr 3 — Good Friday -->
  <rect x="24" y="92" width="76" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="62" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#D95740">3</text>
  <text x="62" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Good</text>
  <text x="62" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Friday</text>

  <!-- Apr 4 — Weekend -->
  <rect x="106" y="92" width="76" height="88" rx="12" fill="#EEECEA"/>
  <text x="144" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#78716C">4</text>
  <text x="144" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Weekend</text>

  <!-- Apr 5 — Easter Sunday -->
  <rect x="188" y="92" width="76" height="88" rx="12" fill="#EEECEA" stroke="#C6C1B9" stroke-width="1"/>
  <text x="226" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#78716C">5</text>
  <text x="226" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Easter</text>
  <text x="226" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Sunday</text>

  <!-- Apr 6 — PTO 1 -->
  <rect x="270" y="92" width="76" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="308" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">6</text>
  <text x="308" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 1</text>

  <!-- Apr 7 — PTO 2 -->
  <rect x="352" y="92" width="76" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="390" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">7</text>
  <text x="390" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 2</text>

  <!-- Apr 8 — PTO 3 -->
  <rect x="434" y="92" width="76" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="472" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">8</text>
  <text x="472" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 3</text>

  <!-- Apr 9 — PTO 4 -->
  <rect x="516" y="92" width="76" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="554" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">9</text>
  <text x="554" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 4</text>

  <!-- Apr 10 — Optional -->
  <rect x="598" y="92" width="76" height="88" rx="12" fill="#F7F6F2" stroke="#E5E2DA" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="636" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#A8A29E">10</text>
  <text x="636" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">Workday</text>
  <text x="636" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">(or PTO 5)</text>

  <!-- Apr 11–12 — Weekend -->
  <rect x="680" y="92" width="96" height="88" rx="12" fill="#EEECEA"/>
  <text x="728" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#78716C">11-12</text>
  <text x="728" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Weekend</text>

  <!-- Divider -->
  <rect x="24" y="200" width="752" height="1" fill="#E5E2DA"/>

  <!-- Legend -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#44403C">
    <rect x="40" y="220" width="14" height="14" rx="4" fill="#E8F3F3" stroke="#1A6363" stroke-width="1"/>
    <text x="62" y="232">PTO days (4 total)</text>
    <rect x="212" y="220" width="14" height="14" rx="4" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
    <text x="234" y="232">Holiday</text>
    <rect x="340" y="220" width="14" height="14" rx="4" fill="#EEECEA"/>
    <text x="362" y="232">Weekends</text>
    <rect x="468" y="220" width="14" height="14" rx="4" fill="#F7F6F2" stroke="#E5E2DA" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="490" y="232">Optional PTO</text>
  </g>

  <!-- Result callout -->
  <rect x="24" y="256" width="752" height="56" rx="12" fill="#1A6363"/>
  <text x="400" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.75">Use just</text>
  <text x="400" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="600" fill="#FFF">4 PTO days to get 10 consecutive days off — a 2.5x return</text>
</svg>