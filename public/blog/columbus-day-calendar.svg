<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="16" fill="#F7F6F2"/>
  <rect y="0" width="800" height="52" rx="16" fill="#1A6363"/>
  <rect y="28" width="800" height="24" fill="#1A6363"/>
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="600" fill="#FFF">October 2026 — Your 4-Day Fall Foliage Window</text>

  <!-- Day headers row -->
  <g font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78716C" text-anchor="middle">
    <text x="116" y="80">FRI</text>
    <text x="310" y="80">SAT-SUN</text>
    <text x="504" y="80">MON</text>
    <text x="688" y="80">TUE</text>
  </g>

  <!-- Oct 9 — PTO 1 -->
  <rect x="24" y="92" width="184" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="116" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">9</text>
  <text x="116" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 1</text>

  <!-- Oct 10-11 — Weekend -->
  <rect x="218" y="92" width="184" height="88" rx="12" fill="#EEECEA"/>
  <text x="310" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#78716C">10-11</text>
  <text x="310" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Weekend</text>

  <!-- Oct 12 — Columbus Day -->
  <rect x="412" y="92" width="184" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="504" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#D95740">12</text>
  <text x="504" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Columbus Day /</text>
  <text x="504" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Indigenous Peoples'</text>

  <!-- Oct 13 — Back to work -->
  <rect x="606" y="92" width="170" height="88" rx="12" fill="#F7F6F2" stroke="#E5E2DA" stroke-width="1"/>
  <text x="688" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#A8A29E">13</text>
  <text x="688" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">Back to work</text>

  <!-- Divider -->
  <rect x="24" y="200" width="752" height="1" fill="#E5E2DA"/>

  <!-- Legend -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#44403C">
    <rect x="80" y="220" width="14" height="14" rx="4" fill="#E8F3F3" stroke="#1A6363" stroke-width="1"/>
    <text x="102" y="232">PTO day (1 total)</text>
    <rect x="300" y="220" width="14" height="14" rx="4" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
    <text x="322" y="232">Holiday</text>
    <rect x="440" y="220" width="14" height="14" rx="4" fill="#EEECEA"/>
    <text x="462" y="232">Weekend</text>
    <rect x="580" y="220" width="14" height="14" rx="4" fill="#F7F6F2" stroke="#E5E2DA" stroke-width="1"/>
    <text x="602" y="232">Workday</text>
  </g>

  <!-- Result callout -->
  <rect x="24" y="256" width="752" height="56" rx="12" fill="#1A6363"/>
  <text x="400" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.75">Use just</text>
  <text x="400" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="600" fill="#FFF">1 PTO day to get 4 consecutive days off — a 4.0x return</text>
</svg>