<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <rect width="800" height="220" rx="16" fill="#F7F6F2"/>

  <!-- Card 1: Mini-Break (teal) -->
  <rect x="24" y="24" width="236" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="24" y="24" width="236" height="44" rx="12" fill="#E8F3F3"/>
  <rect x="24" y="56" width="236" height="12" fill="#FFF"/>
  <text x="142" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1A6363">Mini-Break</text>
  <text x="142" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Veterans Day window</text>
  <text x="142" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Nov 11 - Nov 15</text>
  <rect x="56" y="118" width="112" height="28" rx="6" fill="#1A6363" opacity="0.08"/>
  <text x="112" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1A6363">2 PTO</text>
  <text x="112" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1A6363">days used</text>
  <rect x="56" y="152" width="112" height="28" rx="6" fill="#1A6363" opacity="0.07"/>
  <text x="112" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1A6363">5 days</text>
  <text x="112" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1A6363">off total</text>

  <!-- Card 2: Extended (sage) -->
  <rect x="276" y="24" width="236" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="276" y="24" width="236" height="44" rx="12" fill="#EEF6F1"/>
  <rect x="276" y="56" width="236" height="12" fill="#FFF"/>
  <text x="394" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#4A7C5E">Extended</text>
  <text x="394" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Thanksgiving window</text>
  <text x="394" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Nov 21 - Nov 29</text>
  <rect x="308" y="118" width="112" height="28" rx="6" fill="#4A7C5E" opacity="0.08"/>
  <text x="364" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4A7C5E">3 PTO</text>
  <text x="364" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4A7C5E">days used</text>
  <rect x="308" y="152" width="112" height="28" rx="6" fill="#4A7C5E" opacity="0.07"/>
  <text x="364" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4A7C5E">9 days</text>
  <text x="364" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4A7C5E">off total</text>

  <!-- Card 3: Mega-Break (coral) -->
  <rect x="528" y="24" width="248" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="528" y="24" width="248" height="44" rx="12" fill="#FEF0ED"/>
  <rect x="528" y="56" width="248" height="12" fill="#FFF"/>
  <text x="652" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#D95740">Mega-Break</text>
  <text x="652" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Both holidays combined</text>
  <text x="652" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Nov 11 - Nov 29</text>
  <rect x="586" y="118" width="112" height="28" rx="6" fill="#D95740" opacity="0.08"/>
  <text x="642" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#D95740">7 PTO</text>
  <text x="642" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D95740">days used</text>
  <rect x="586" y="152" width="112" height="28" rx="6" fill="#D95740" opacity="0.07"/>
  <text x="642" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#D95740">16 days</text>
  <text x="642" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D95740">off total</text>
</svg>