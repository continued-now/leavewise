<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="16" fill="#F7F6F2"/>
  <rect y="0" width="800" height="52" rx="16" fill="#1A6363"/>
  <rect y="28" width="800" height="24" fill="#1A6363"/>
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="600" fill="#FFF">February 2026 — Your 5-Day Window</text>

  <!-- Day headers row -->
  <g font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78716C" text-anchor="middle">
    <text x="104" y="80">THU</text>
    <text x="248" y="80">FRI</text>
    <text x="392" y="80">SAT-SUN</text>
    <text x="560" y="80">MON</text>
  </g>

  <!-- Feb 12 — PTO 1 -->
  <rect x="40" y="92" width="128" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="104" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">12</text>
  <text x="104" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 1</text>

  <!-- Feb 13 — PTO 2 -->
  <rect x="184" y="92" width="128" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="248" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">13</text>
  <text x="248" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 2</text>

  <!-- Feb 14-15 — Weekend -->
  <rect x="328" y="92" width="128" height="88" rx="12" fill="#EEECEA"/>
  <text x="392" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#78716C">14-15</text>
  <text x="392" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Weekend</text>
  <text x="392" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">(Valentine's Day)</text>

  <!-- Feb 16 — Presidents' Day -->
  <rect x="472" y="92" width="176" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="560" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#D95740">16</text>
  <text x="560" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Presidents'</text>
  <text x="560" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Day</text>

  <!-- Divider -->
  <rect x="24" y="200" width="752" height="1" fill="#E5E2DA"/>

  <!-- Legend -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#44403C">
    <rect x="100" y="220" width="14" height="14" rx="4" fill="#E8F3F3" stroke="#1A6363" stroke-width="1"/>
    <text x="122" y="232">PTO days (2 total)</text>
    <rect x="312" y="220" width="14" height="14" rx="4" fill="#FEF0ED" stroke="#D95740" stroke-width="1"/>
    <text x="334" y="232">Holiday</text>
    <rect x="440" y="220" width="14" height="14" rx="4" fill="#EEECEA"/>
    <text x="462" y="232">Weekends</text>
  </g>

  <!-- Result callout -->
  <rect x="24" y="256" width="752" height="56" rx="12" fill="#1A6363"/>
  <text x="400" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.75">Use just</text>
  <text x="400" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="600" fill="#FFF">2 PTO days to get 5 consecutive days off — a 2.5x return</text>
</svg>