<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <rect width="800" height="160" rx="16" fill="#1A6363"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFF" opacity="0.6" letter-spacing="1">BOOKING TIMELINE</text>

  <!-- Track -->
  <rect x="48" y="62" width="704" height="4" rx="2" fill="#FFF" opacity="0.12"/>

  <!-- Now marker -->
  <circle cx="120" cy="64" r="7" fill="#D95740"/>
  <circle cx="120" cy="64" r="3" fill="#FFF"/>
  <text x="120" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">NOW</text>

  <!-- Sweet spot highlight -->
  <rect x="100" y="59" width="380" height="10" rx="5" fill="#FFF" opacity="0.18"/>

  <!-- Christmas marker -->
  <circle cx="700" cy="64" r="5" fill="#FFF" opacity="0.4"/>
  <text x="700" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFF" opacity="0.6">DEC 25</text>

  <!-- Booking windows -->
  <g font-family="system-ui, sans-serif" fill="#FFF">
    <!-- Best prices -->
    <rect x="80" y="88" width="190" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="175" y="108" text-anchor="middle" font-size="12" font-weight="600">Sep-Oct: Best prices</text>
    <text x="175" y="124" text-anchor="middle" font-size="11" opacity="0.6">Save 15-30% on flights</text>

    <!-- Prices climbing -->
    <rect x="290" y="88" width="190" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="385" y="108" text-anchor="middle" font-size="12" font-weight="600">Nov: Prices climbing</text>
    <text x="385" y="124" text-anchor="middle" font-size="11" opacity="0.6">+40% for Caribbean flights</text>

    <!-- Hotels -->
    <rect x="500" y="88" width="184" height="44" rx="8" fill="#FFF" opacity="0.08" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="592" y="108" text-anchor="middle" font-size="12" font-weight="600">Hotels</text>
    <text x="592" y="124" text-anchor="middle" font-size="11" opacity="0.6">Book refundable now</text>
  </g>
</svg>