  <text x="356" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#C4872A">→ 4일 연휴</text>

  <!-- Sep: 추석 2일 -->
  <rect x="408" y="90" width="88" height="104" rx="10" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="418" y="100" width="68" height="24" rx="6" fill="#1A6363" opacity="0.12"/>
  <text x="452" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1A6363">2일</text>
  <text x="452" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1917">추석</text>
  <text x="452" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">연휴 확장</text>
  <text x="452" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1A6363">→ 7일 연휴</text>

  <!-- Oct: 황금연휴 2일 -->
  <rect x="504" y="90" width="88" height="104" rx="10" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="514" y="100" width="68" height="24" rx="6" fill="#4A7C5E" opacity="0.12"/>
  <text x="548" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#4A7C5E">2일</text>
  <text x="548" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1917">황금연휴</text>
  <text x="548" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">개천절~한글날</text>
  <text x="548" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4A7C5E">→ 5일 연휴</text>

  <!-- Dec: 크리스마스 2일 -->
  <rect x="600" y="90" width="88" height="104" rx="10" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="610" y="100" width="68" height="24" rx="6" fill="#D95740" opacity="0.12"/>
  <text x="644" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#D95740">2일</text>
  <text x="644" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1917">크리스마스</text>
  <text x="644" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">연말 연휴</text>
  <text x="644" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D95740">→ 5일 연휴</text>

  <!-- Total badge -->
  <rect x="700" y="110" width="76" height="64" rx="10" fill="#1A6363"/>
  <text x="738" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" opacity="0.7">합계</text>
  <text x="738" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#FFF">11일</text>
</svg>