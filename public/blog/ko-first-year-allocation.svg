<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <rect width="800" height="220" rx="16" fill="#F7F6F2"/>

  <!-- Title bar -->
  <text x="400" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">11일 연차 최적 배분</text>

  <!-- Month bar chart -->
  <!-- Labels row -->
  <text x="68" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">2월</text>
  <text x="136" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">5월</text>
  <text x="204" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">7월</text>
  <text x="272" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">8월</text>
  <text x="408" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">9월</text>
  <text x="544" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">10월</text>
  <text x="680" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">12월</text>

  <!-- Cards for each allocation -->
  <!-- Feb: 설날 2일 -->
  <rect x="24" y="90" width="88" height="104" rx="10" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="34" y="100" width="68" height="24" rx="6" fill="#1A6363" opacity="0.12"/>
  <text x="68" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1A6363">2일</text>
  <text x="68" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1917">설날</text>
  <text x="68" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">연휴 확장</text>
  <text x="68" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1A6363">→ 7일 연휴</text>

  <!-- May: 어린이날 1일 -->
  <rect x="120" y="90" width="88" height="104" rx="10" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="130" y="100" width="68" height="24" rx="6" fill="#4A7C5E" opacity="0.12"/>
  <text x="164" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#4A7C5E">1일</text>
  <text x="164" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1917">어린이날</text>
  <text x="164" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">월요일 연차</text>
  <text x="164" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4A7C5E">→ 4일 연휴</text>

  <!-- Jul: 제헌절 1일 -->
  <rect x="216" y="90" width="88" height="104" rx="10" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="226" y="100" width="68" height="24" rx="6" fill="#D95740" opacity="0.12"/>
  <text x="260" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#D95740">1일</text>
  <text x="260" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1917">제헌절</text>
  <text x="260" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">목요일 연차</text>
  <text x="260" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D95740">→ 4일 연휴</text>

  <!-- Aug: 광복절 1일 -->
  <rect x="312" y="90" width="88" height="104" rx="10" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="322" y="100" width="68" height="24" rx="6" fill="#C4872A" opacity="0.12"/>
  <text x="356" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#C4872A">1일</text>
  <text x="356" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1917">광복절</text>
