    <text x="156" y="80">TUE</text>
    <text x="238" y="80">WED</text>
    <text x="320" y="80">THU</text>
    <text x="402" y="80">FRI</text>
    <text x="496" y="80">SAT-SUN</text>
    <text x="614" y="80">MON</text>
  </g>

  <!-- May 16-17 — Weekend -->
  <rect x="24" y="92" width="76" height="88" rx="12" fill="#EEECEA"/>
