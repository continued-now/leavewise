  <rect x="364" y="92" width="76" height="88" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="402" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#1A6363">22</text>
  <text x="402" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1A6363">PTO 4</text>

  <!-- May 23-24 — Weekend -->
  <rect x="446" y="92" width="96" height="88" rx="12" fill="#EEECEA"/>
  <text x="494" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#78716C">23-24</text>
  <text x="494" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Weekend</text>

