  <rect x="552" y="92" width="120" height="88" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="612" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#D95740">25</text>
  <text x="612" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Memorial</text>
  <text x="612" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Day</text>

