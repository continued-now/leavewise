<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <rect width="800" height="220" rx="16" fill="#F7F6F2"/>

  <!-- Cape Cod -->
  <rect x="24" y="24" width="176" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="24" y="24" width="176" height="56" rx="12" fill="#E8F3F3"/>
  <rect x="24" y="68" width="176" height="12" fill="#FFF"/>
  <g transform="translate(112,30)">
    <path d="M-18 38C-14 32-6 30 0 28C6 30 14 32 18 38" fill="#1A6363" opacity="0.3"/>
    <path d="M-18 38C-10 36-4 35 0 34C4 35 10 36 18 38" fill="#1A6363" opacity="0.2"/>
    <circle cx="-4" cy="18" r="5" fill="#1A6363" opacity="0.35"/>
    <line x1="-4" y1="13" x2="-4" y2="8" stroke="#1A6363" stroke-width="1.5" opacity="0.35"/>
    <path d="M-4 8L1 12" stroke="#1A6363" stroke-width="1" fill="none" opacity="0.35"/>
  </g>
  <text x="112" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Cape Cod</text>
  <text x="112" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Warmest water: 68-72F</text>
  <text x="112" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Tourists vanish post-Labor Day</text>
  <rect x="56" y="152" width="112" height="26" rx="6" fill="#1A6363" opacity="0.07"/>
  <text x="112" y="169" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A6363">Empty beaches</text>

  <!-- Lake Tahoe -->
  <rect x="216" y="24" width="176" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="216" y="24" width="176" height="56" rx="12" fill="#EEF6F1"/>
  <rect x="216" y="68" width="176" height="12" fill="#FFF"/>
  <g transform="translate(304,28)">
    <path d="M-16 42L-6 16L0 24L6 16L16 42Z" fill="#4A7C5E" opacity="0.35"/>
    <path d="M-12 42C-8 36-4 34 0 33C4 34 8 36 12 42" fill="#4A7C5E" opacity="0.4"/>
    <rect x="-14" y="40" width="28" height="3" rx="1" fill="#4A7C5E" opacity="0.35"/>
  </g>
  <text x="304" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Lake Tahoe</text>
  <text x="304" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Clearest days of the year</text>
  <text x="304" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Hike, kayak in near-solitude</text>
  <rect x="248" y="152" width="112" height="26" rx="6" fill="#4A7C5E" opacity="0.07"/>
  <text x="304" y="169" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A7C5E">Shoulder season</text>

  <!-- Greece -->
  <rect x="408" y="24" width="176" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="408" y="24" width="176" height="56" rx="12" fill="#FEF0ED"/>
  <rect x="408" y="68" width="176" height="12" fill="#FFF"/>
  <g transform="translate(496,30)">
    <circle cy="8" r="12" fill="#D95740" opacity="0.3"/>
    <path d="M-8 38C-4 32 0 30 0 30C0 30 4 32 8 38" fill="#D95740" opacity="0.25"/>
    <rect x="-6" y="0" width="12" height="16" rx="2" fill="none" stroke="#D95740" stroke-width="1.5" opacity="0.4"/>
    <line x1="-6" y1="6" x2="6" y2="6" stroke="#D95740" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="0" x2="0" y2="16" stroke="#D95740" stroke-width="1" opacity="0.35"/>
  </g>
  <text x="496" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Greece</text>
  <text x="496" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Best month: warm, uncrowded</text>
  <text x="496" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Airfare drops post-Labor Day</text>
  <rect x="440" y="152" width="112" height="26" rx="6" fill="#D95740" opacity="0.07"/>
  <text x="496" y="169" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#D95740">Top pick</text>

  <!-- Portugal -->
  <rect x="600" y="24" width="176" height="172" rx="12" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <rect x="600" y="24" width="176" height="56" rx="12" fill="#FDF4E7"/>
  <rect x="600" y="68" width="176" height="12" fill="#FFF"/>
  <g transform="translate(688,30)">
    <circle cy="8" r="11" fill="#C4872A" opacity="0.3"/>
    <line x1="-16" y1="8" x2="-12" y2="8" stroke="#C4872A" stroke-width="2" opacity="0.35"/>
    <line x1="12" y1="8" x2="16" y2="8" stroke="#C4872A" stroke-width="2" opacity="0.35"/>
    <line x1="0" y1="-6" x2="0" y2="-10" stroke="#C4872A" stroke-width="2" opacity="0.35"/>
    <line x1="-9" y1="-2" x2="-12" y2="-5" stroke="#C4872A" stroke-width="2" opacity="0.35"/>
    <line x1="9" y1="-2" x2="12" y2="-5" stroke="#C4872A" stroke-width="2" opacity="0.35"/>
  </g>
  <text x="688" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1C1917">Portugal</text>
  <text x="688" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Algarve 80F and sunny</text>
  <text x="688" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Fraction of August crowds</text>
  <rect x="632" y="152" width="112" height="26" rx="6" fill="#C4872A" opacity="0.07"/>
  <text x="688" y="169" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#C4872A">Great value</text>
</svg>