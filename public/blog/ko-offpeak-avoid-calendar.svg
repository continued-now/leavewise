<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 800 310"><rect width="800" height="310" fill="#f7f6f2" rx="16"/><text x="400" y="28" fill="#1c1917" font-family="Georgia, serif" font-size="16" font-weight="700" text-anchor="middle">연간 혼잡 캘린더 — 갭을 찾아라</text><text x="400" y="46" fill="#78716c" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">한국 연휴(코럴) + 현지 공휴일(앰버) 사이의 틈이 스위트스팟(틸)</text><g fill="#57534e" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle"><text x="84" y="72">1월</text><text x="144" y="72">2월</text><text x="204" y="72">3월</text><text x="264" y="72">4월</text><text x="324" y="72">5월</text><text x="384" y="72">6월</text><text x="444" y="72">7월</text><text x="504" y="72">8월</text><text x="564" y="72">9월</text><text x="624" y="72">10월</text><text x="684" y="72">11월</text><text x="744" y="72">12월</text></g><line x1="54" x2="774" y1="78" y2="78" stroke="#d6d3cc" stroke-width="1"/><text x="36" y="102" fill="#d95740" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" transform="rotate(-90 36 102)">한국</text><rect x="54" y="84" width="720" height="32" fill="#fff" stroke="#e5e2da" rx="4"/><rect x="124" y="86" width="40" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="144" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">설날</text><rect x="304" y="86" width="40" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="324" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">5월</text><rect x="424" y="86" width="80" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="464" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">여름휴가</text><rect x="544" y="86" width="50" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="569" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">추석</text><rect x="714" y="86" width="48" height="28" fill="#d95740" opacity=".25" rx="3"/><text x="738" y="104" fill="#d95740" font-family="system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">연말</text><text x="36" y="148" fill="#c4872a" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" transform="rotate(-90 36 148)">현지</text><rect x="54" y="124" width="720" height="32" fill="#fff" stroke="#e5e2da" rx="4"/><rect x="72" y="126" width="30" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="87" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">쇼가츠</text><rect x="114" y="126" width="50" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="139" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">설/춘절</text><rect x="196" y="126" width="24" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="208" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">니에피</text><rect x="244" y="126" width="34" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="261" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">쏭끄란</text><rect x="283" y="126" width="28" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="297" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">일본GW</text><rect x="424" y="126" width="50" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="449" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">유럽성수기</text><rect x="480" y="126" width="30" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="495" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">오봉</text><rect x="550" y="126" width="30" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="565" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">실버위크</text><rect x="604" y="126" width="40" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="624" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">중국황금연휴</text><rect x="714" y="126" width="48" height="28" fill="#c4872a" opacity=".25" rx="3"/><text x="738" y="144" fill="#c4872a" font-family="system-ui, sans-serif" font-size="7" font-weight="600" text-anchor="middle">크리스마스</text><text x="36" y="190" fill="#1a6363" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" transform="rotate(-90 36 190)">스위트스팟</text><rect x="54" y="164" width="720" height="32" fill="#fff" stroke="#e5e2da" rx="4"/><rect x="170" y="166" width="65" height="28" fill="#1a6363" opacity=".2" rx="3"/><text x="202" y="184" fill="#1a6363" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">3월</text><rect x="355" y="166" width="60" height="28" fill="#1a6363" opacity=".2" rx="3"/><text x="385" y="184" fill="#1a6363" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">6월</text><rect x="520" y="166" width="20" height="28" fill="#1a6363" opacity=".2" rx="3"/><rect x="590" y="166" width="15" height="28" fill="#1a6363" opacity=".2" rx="3"/><rect x="650" y="166" width="55" height="28" fill="#1a6363" opacity=".2" rx="3"/><text x="677" y="184" fill="#1a6363" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">11월</text><rect x="30" y="210" width="740" height="90" fill="#fff" stroke="#e5e2da" rx="8"/><text x="400" y="232" fill="#1c1917" font-family="Georgia, serif" font-size="13" font-weight="700" text-anchor="middle">핵심 인사이트</text><g fill="#57534e" font-family="system-ui, sans-serif" font-size="11"><text x="60" y="254">3월 — 설날·춘절 끝, 쏭끄란·골든위크 전. 대부분의 여행지에서 가성비 최고.</text><text x="60" y="272">6월 — 한국 연휴 없음 + 일본 오봉 전 + 유럽 성수기 전. 가장 넓은 스위트스팟.</text><text x="60" y="290">11월 — 추석 끝, 크리스마스 전. 태국·베트남 건기 시작, 일본 단풍 시즌.</text></g></svg>