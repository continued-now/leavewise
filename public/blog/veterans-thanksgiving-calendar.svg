  <rect x="564" y="106" width="76" height="76" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="602" y="131" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#D95740">26-27</text>
  <text x="602" y="149" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Thanksgiving</text>
  <text x="602" y="159" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">+ Day After</text>

  <!-- Nov 28-29 — Weekend -->
  <rect x="676" y="106" width="100" height="76" rx="12" fill="#EEECEA"/>
  <text x="726" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#78716C">28-29</text>
  <text x="726" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Weekend</text>

  <!-- Divider -->
