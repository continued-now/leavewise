  <text x="590" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1A6363">THANKSGIVING WINDOW</text>

  <!-- Day headers - Thanksgiving cluster -->
  <g font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#78716C" text-anchor="middle">
