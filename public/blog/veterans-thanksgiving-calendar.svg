<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="16" fill="#F7F6F2"/>
  <rect y="0" width="800" height="52" rx="16" fill="#1A6363"/>
  <rect y="28" width="800" height="24" fill="#1A6363"/>
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="600" fill="#FFF">November 2026 — Veterans Day + Thanksgiving Double Window</text>

  <!-- VETERANS DAY WINDOW label -->
  <text x="172" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1A6363">VETERANS DAY WINDOW</text>

  <!-- Day headers - Veterans cluster -->
  <g font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#78716C" text-anchor="middle">
    <text x="56" y="97">WED</text>
    <text x="134" y="97">THU</text>
    <text x="212" y="97">FRI</text>
    <text x="296" y="97">SAT-SUN</text>
  </g>

  <!-- Nov 11 — Veterans Day -->
  <rect x="24" y="106" width="64" height="76" rx="12" fill="#FEF0ED" stroke="#D95740" stroke-width="1.5"/>
  <text x="56" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#D95740">11</text>
  <text x="56" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Veterans</text>
  <text x="56" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D95740">Day</text>

  <!-- Nov 12 — PTO 1 -->
  <rect x="96" y="106" width="76" height="76" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="134" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A6363">12</text>
  <text x="134" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1A6363">PTO 1</text>

  <!-- Nov 13 — PTO 2 -->
  <rect x="178" y="106" width="68" height="76" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="212" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A6363">13</text>
  <text x="212" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1A6363">PTO 2</text>

  <!-- Nov 14-15 — Weekend -->
  <rect x="252" y="106" width="88" height="76" rx="12" fill="#EEECEA"/>
  <text x="296" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#78716C">14-15</text>
  <text x="296" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Weekend</text>

  <!-- Connector dots -->
  <text x="365" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#78716C">...</text>

