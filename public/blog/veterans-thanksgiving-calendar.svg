  <rect x="448" y="106" width="52" height="76" rx="12" fill="#E8F3F3" stroke="#1A6363" stroke-width="1.5"/>
  <text x="474" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A6363">24</text>
  <text x="474" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1A6363">PTO 4</text>

