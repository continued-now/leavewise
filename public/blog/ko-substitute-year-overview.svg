  <rect x="712" y="58" width="58" height="82" rx="8" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <text x="741" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#78716C">12월</text>
