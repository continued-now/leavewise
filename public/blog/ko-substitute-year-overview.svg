  <!-- 1월 — neutral -->
  <rect x="30" y="58" width="58" height="82" rx="8" fill="#FFF" stroke="#E5E2DA" stroke-width="1"/>
  <text x="59" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#78716C">1월</text>
  <text x="59" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">-</text>

  <!-- 2월 — neutral -->
