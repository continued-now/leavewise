<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <rect width="800" height="160" rx="16" fill="#F7F6F2"/>

  <!-- Header bar -->
  <rect x="24" y="16" width="752" height="32" rx="8" fill="#1A6363"/>
  <text x="400" y="37" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#FFF">2026년 대체공휴일 한눈에 보기</text>

  <!-- Month cells: 12 months in a row -->
